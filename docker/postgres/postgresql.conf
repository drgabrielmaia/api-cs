# =====================================================================
# PostgreSQL 15 - Optimized for 1 vCPU / 1.2GB RAM (Docker)
# Target: CSSytem VPS with 4GB total (DB gets ~1.2GB)
# =====================================================================

# --- Connection ---
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# --- Memory ---
shared_buffers = 300MB
effective_cache_size = 800MB
work_mem = 4MB
maintenance_work_mem = 64MB
wal_buffers = 16MB
temp_buffers = 8MB

# --- WAL / Checkpoint ---
wal_level = minimal
max_wal_senders = 0
max_wal_size = 512MB
min_wal_size = 64MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# --- Planner (SSD optimized) ---
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# --- Autovacuum (conservative for 1 CPU) ---
autovacuum = on
autovacuum_max_workers = 1
autovacuum_naptime = 120s
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# --- Background Writer ---
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# --- Logging (minimal for performance) ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%a.log'
log_rotation_age = 1d
log_rotation_size = 50MB
log_truncate_on_rotation = on
log_min_duration_statement = 2000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_connections = off
log_disconnections = off
log_statement = 'none'

# --- Performance ---
jit = off
huge_pages = off
dynamic_shared_memory_type = posix

# --- Locale ---
timezone = 'America/Sao_Paulo'
lc_messages = 'en_US.utf8'
