version: '3.8'

# =====================================================================
# CSSytem - Docker Compose (Optimized for 1 vCPU / 4GB RAM)
# PostgreSQL: ~2GB | API: ~2GB
# =====================================================================

services:

  # -----------------------------------------------------------------
  # PostgreSQL 15 - Database (direct connection via pg, no PostgREST)
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cssystem-db
    restart: unless-stopped
    mem_limit: 2048m
    mem_reservation: 512m
    cpus: 0.5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cssystem}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cssystem_db_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/postgres/03-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cssystem}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------
  # WhatsApp API (Node.js + Baileys) - connects to PG via db.js
  # -----------------------------------------------------------------
  whatsapp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cssystem-api
    restart: unless-stopped
    mem_limit: 2048m
    mem_reservation: 512m
    cpus: 0.8
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      TZ: America/Sao_Paulo
      NODE_OPTIONS: "--max-old-space-size=1800"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cssystem}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cssystem_db_2026}
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys:rw
      - ./logs:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health > /dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
